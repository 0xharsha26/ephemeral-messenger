<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ephemeral Messenger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      background: radial-gradient(circle at top, #1e1b4b, #0b1220);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    .panel {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h2, h3 {
      margin-bottom: 14px;
    }

    .sub {
      color: #9ca3af;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .message-card {
      background: #0f172a;
      border: 1px solid #2e1065;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.1);
    }

    .message-card p {
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .meta {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #0f172a;
      color: white;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    input:focus, textarea:focus {
      border-color: #8B5CF6;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #8B5CF6;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #7C3AED;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
    }

    .secondary {
      background: #1f2937;
      color: #e5e7eb;
    }

    .secondary:hover {
      background: #374151;
      box-shadow: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .status {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 8px;
      min-height: 20px;
    }

    .burning {
      color: #fca5a5;
      font-weight: bold;
    }

    .empty {
      color: #94a3b8;
      padding: 12px 0;
    }

    .plaintext {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(139, 92, 246, 0.08);
    border: 1px solid rgba(139, 92, 246, 0.3);
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="topbar">
        <div>
          <h2>Inbox</h2>
          <div class="sub">Logged in as <span id="currentUser"></span></div>
        </div>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>

      <div id="messages" class="message-list"></div>
    </div>

    <div class="panel">
      <h2>Send Encrypted Message</h2>
      <div class="sub">Messages are encrypted in the browser before sending</div>

      <div class="row">
        <input id="to" placeholder="Recipient username" />
      </div>

      <div class="row">
        <textarea id="msg" placeholder="Write your message..."></textarea>
      </div>

      <div class="row">
        <input id="sharedSecret" type="password" placeholder="Shared secret / passphrase" />
      </div>

      <div class="row">
        <input id="burn" type="number" min="1" max="300" value="10" placeholder="Burn after seconds" />
      </div>

      <div class="row">
        <button onclick="sendMessage()">Encrypt & Send</button>
        <button class="secondary" onclick="loadInbox()">Refresh Inbox</button>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
